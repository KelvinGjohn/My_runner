<!DOCTYPE html>
<html>
<head>
    <title>All Runners</title>
</head>
<body>

<h1>All Runners</h1>

<table border="1">

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Surname</th>
    </tr>

    <tr th:each="runner : ${runners}">
        <td th:text="${runner.idru}"></td>
        <td th:text="${runner.name}"></td>
        <td th:text="${runner.surname}"></td>
    </tr>

</table>

</body>
</html>
