<!DOCTYPE html>
<html>
<head>
    <title>All Runners</title>
</head>
<body>

<h1>All Runners</h1>

<table border="1">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Surname</th>
    <th>Actions</th>
</tr>

<tr th:each="runner : ${runners}">
    <td th:text="${runner.idru}"></td>
    <td th:text="${runner.name}"></td>
    <td th:text="${runner.surname}"></td>

    <td>
        <a th:href="@{/runner/update/{id}(id=${runner.idru})}">
            Update
        </a>

        <a th:href="@{/runner/delete/{id}(id=${runner.idru})}">
            Delete
        </a>
    </td>
</tr>

</table>


</body>
</html>
